<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BrainSignal Simulator</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="bg"></div>

<div class="app">

    
    <header class="header">
        <h1>BrainSignal Simulator</h1>
        <p>Chaotic Dynamics • ANN • Spiking Neural Networks</p>

        <div id="status" class="status">● Ready</div>
    </header>

    <!-- MAIN GRID -->
    <div class="grid">

        <!-- LEFT: CONTROLS -->
        <section class="card controls">

            <h2>Simulation Controls</h2>

            <label>Model</label>
            <select id="model">
                <option value="lorenz">Lorenz</option>
                <option value="lif">LIF</option>
                <option value="izhikevich">Izhikevich</option>
                <option value="ann">ANN</option>
            </select>

            <label>Solver</label>
            <select id="solver">
                <option value="rk4">RK4</option>
                <option value="euler">Euler</option>
            </select>

            <label>T</label>
            <input id="T" type="number" value="5">

            <label>dt</label>
            <input id="dt" type="number" value="0.01">

            <button onclick="runSimulation()">▶ Run Simulation</button>

        </section>

        <!-- RIGHT: MAIN CHART -->
        <section class="card">

            <h2>Simulation Result</h2>

            <canvas id="chart"></canvas>

        </section>

        <!-- SPIKE RASTER -->
        <section class="card full">

            <h2>Spike Activity</h2>

            <div id="spikes"></div>

        </section>

        <!-- STATS -->
        <section class="card full stats">

            <h2>Simulation Information</h2>

            <div id="stats">
                Waiting for simulation...
            </div>

        </section>

    </div>

</div>

<script src="/static/app.js"></script>

</body>
</html>
